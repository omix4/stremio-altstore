name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Looking for a new feature? Please describe what, why, and how you'd like it implemented.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Who benefits?
      placeholder: |
        The updater currently only scans known semver versions. If Stremio
        releases a new minor (e.g. 2.1.0), it doesn't notice.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think it should be implemented?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Other approaches you considered
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, related issues, etc.
    validations:
      required: false
