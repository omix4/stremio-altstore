name: Update Stremio source

# Scans Stremio's dl.strem.io CDN every 6 hours, discovers new iOS / tvOS
# IPA versions, and adds them to the JSON sources. Auto-commits if there
# are changes.

on:
  schedule:
    # Her 6 saatte bir (UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      info_plist:
        description: "Parse Info.plist from new IPAs (slower, ~100KB/IPA)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    # Skip re-running for our own commits (prevents an infinite loop)
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"

permissions:
  contents: write

# Serialize runs so two overlapping runs never race to push to main
# (the classic "! [rejected] ... fetch first" failure). Queue rather than
# cancel — an in-progress run may be mid-push and must finish cleanly.
concurrency:
  group: update-stremio-source
  cancel-in-progress: false

jobs:
  update:
    name: Scan CDN and update JSONs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Run updater (dry-run, log only)
        id: dry
        run: |
          echo "::group::Dry run — log of discovered versions"
          python3 stremio-updater.py --dry-run --verbose 2>&1 | tee dry-run.log
          echo "::endgroup::"

      - name: Run updater (apply changes)
        id: apply
        run: |
          set -e
          ARGS=(--platform all)
          if [ "${{ inputs.info_plist }}" = "true" ]; then
            ARGS+=(--info-plist)
          fi
          python3 stremio-updater.py "${ARGS[@]}"

      - name: Backfill IPA integrity hashes (budgeted)
        # Adds sha256 to a few versions per run (newest first). Downloads full
        # IPAs, so it is budget-limited and fully decoupled from the updater —
        # a hashing hiccup must never block the source update, hence continue-on-error.
        continue-on-error: true
        env:
          SHA256_BUDGET: "4"
        run: |
          python3 scripts/add_hashes.py

      - name: Regenerate README version tables
        run: |
          # Rebuilds the "Available versions" tables from the JSON sources.
          # Deterministic, no network — only rewrites the marked block.
          python3 scripts/render_readme.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet stremio-ios.json stremio-tvos.json README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "## Diff summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```diff' >> "$GITHUB_STEP_SUMMARY"
            git diff --stat stremio-ios.json stremio-tvos.json README.md >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "stremio-altstore-bot"
          git config user.email "bot@stremio-altstore.local"
          git add stremio-ios.json stremio-tvos.json README.md
          # Detailed commit message
          DIFFSTAT=$(git diff --cached --stat stremio-ios.json stremio-tvos.json README.md | tail -1)
          git commit -m "chore: update Stremio source" \
                     -m "Auto-discovered new Stremio iOS / tvOS versions on dl.strem.io CDN." \
                     -m "" \
                     -m "$DIFFSTAT"
          # Belt-and-suspenders on top of the concurrency guard: if something
          # else pushed to main in the meantime (e.g. a manual push), rebase
          # our commit on top and retry rather than failing the whole run.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Push still rejected after $attempt attempts."
              exit 1
            fi
            echo "Push rejected — rebasing onto latest origin/main and retrying."
            git pull --rebase origin main
          done

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Updater failed. Check the logs."

  canary:
    name: CDN health canary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Periodic health check only — no need to run on every push. Runs
    # independently of the update job so it still fires if that job fails,
    # which is exactly when a silent CDN failure would otherwise hide.
    if: github.event_name != 'push'
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run CDN health check
        id: canary
        run: |
          set +e
          python3 scripts/check_cdn.py > canary.txt 2>&1
          echo "rc=$?" >> "$GITHUB_OUTPUT"
          cat canary.txt

      - name: Open an issue if the CDN looks broken
        if: steps.canary.outputs.rc == '2'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Deduplicate by title marker so a persistent outage doesn't spam issues.
          EXISTING=$(gh issue list --state open --search 'in:title [CDN-HEALTH]' --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "An open [CDN-HEALTH] issue already exists — not opening a duplicate."
            exit 0
          fi
          {
            echo "The CDN health canary detected a problem. The updater can still exit 0 in"
            echo "this state, so this automated issue is the alert that something needs a look."
            echo ""
            echo '```'
            cat canary.txt
            echo '```'
            echo ""
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > body.md
          gh issue create \
            --title "[CDN-HEALTH] Stremio CDN check failed — source may be serving dead downloads" \
            --body-file body.md
